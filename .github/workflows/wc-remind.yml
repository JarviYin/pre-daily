# Pre-kickoff World Cup reminders — external trigger for /api/cron/wc-remind
# (Vercel Hobby's two daily cron slots are taken by the morning edition and
# the evening guide; per-match timing needs a ~30-min cadence).
#
# The endpoint itself decides whether anything is due (kickoff within 2.5h,
# not yet reminded) and no-ops after the tournament ends on 2026-07-20 —
# this workflow can be deleted any time after that date.
name: wc-remind

on:
  schedule:
    - cron: "*/30 * * * *" # GitHub may delay runs; the endpoint tolerates drift
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder endpoint
        run: |
          curl -fsS --max-time 110 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.pre-daily.com/api/cron/wc-remind"
